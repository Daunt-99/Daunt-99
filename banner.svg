<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vikas Mariyappa — GitHub profile banner</title>
  <desc>Animated minimal dark banner</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .line-h { stroke: #21262d; stroke-width: 0.5; }
      .cursor-bar { fill: #58a6ff; animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
      .reveal-prompt { animation: slideIn 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.05s; }
      .reveal-name   { animation: slideIn 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.25s; }
      .reveal-sub    { animation: slideIn 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.45s; }
      .reveal-foot   { animation: slideIn 0.6s cubic-bezier(.22,1,.36,1) both; animation-delay: 0.62s; }
      @keyframes slideIn {
        from { opacity:0; transform:translateX(-12px); }
        to   { opacity:1; transform:translateX(0); }
      }
      .dot-grid { animation: gridpulse 6s ease-in-out infinite; }
      @keyframes gridpulse {
        0%,100% { opacity:0.18; }
        50%     { opacity:0.32; }
      }
      .scan { animation: scanline 5s linear infinite; }
      @keyframes scanline {
        0%   { transform:translateY(0px);   opacity:0; }
        5%   { opacity:0.07; }
        95%  { opacity:0.07; }
        100% { transform:translateY(200px); opacity:0; }
      }
      .corner-bracket { stroke:#21262d; stroke-width:1; fill:none; }
    </style>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#30363d"/>
    </pattern>
  </defs>

  <rect width="680" height="200" class="bg" rx="10"/>
  <rect width="680" height="200" fill="none" stroke="#21262d" stroke-width="0.75" rx="10"/>
  <rect width="680" height="200" fill="url(#dots)" rx="10" class="dot-grid"/>
  <rect x="0" y="44" width="680" height="1.5" fill="#58a6ff" opacity="0.06" class="scan"/>
  <line x1="0" y1="44"  x2="680" y2="44"  class="line-h"/>
  <line x1="0" y1="156" x2="680" y2="156" class="line-h"/>

  <polyline points="20,20 20,10 30,10" class="corner-bracket"/>
  <polyline points="650,10 660,10 660,20" class="corner-bracket"/>
  <polyline points="20,180 20,190 30,190" class="corner-bracket"/>
  <polyline points="650,190 660,190 660,180" class="corner-bracket"/>

  <circle cx="628" cy="22" r="5" fill="#ff5f57"/>
  <circle cx="645" cy="22" r="5" fill="#febc2e"/>
  <circle cx="662" cy="22" r="5" fill="#28c840"/>

  <g class="reveal-prompt">
    <text x="48" y="28" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#3fb950" letter-spacing="0.06em">vikas@github ~ %</text>
  </g>

  <g class="reveal-name">
    <text x="48" y="108" font-family="'SF Mono','Fira Code',monospace" font-size="40" font-weight="700" fill="#e6edf3" letter-spacing="-1px">Vikas Mariyappa</text>
    <rect x="455" y="72" width="10" height="40" class="cursor-bar" rx="1"/>
  </g>

  <g class="reveal-sub">
    <text x="50" y="134" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#58a6ff" letter-spacing="0.04em">CS @ UT Dallas  ·  AI &amp; ML  ·  Builder</text>
  </g>

  <g class="reveal-foot">
    <text font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#484f58">
      <tspan x="48" y="180">github.com/Daunt-99</tspan>
      <tspan dx="24">vdm230002@utdallas.edu</tspan>
    </text>
  </g>
</svg>
