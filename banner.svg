<svg width="100%" viewBox="0 0 680 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vikas Mariyappa — CS @ UT Dallas</title>
  <desc>Clean minimal animated banner</desc>
  <defs>
    <style>
      .banner-bg { fill: #0d1117; }
      .name-text { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 32px; font-weight: 600; fill: #e6edf3; letter-spacing: -0.5px; }
      .sub-text { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; fill: #8b949e; }
      .accent-text { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; fill: #58a6ff; }
      .dot { fill: #3fb950; }
      .cursor { fill: #58a6ff; animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .fade-in-1 { animation: fadeUp 0.6s ease both; animation-delay: 0.1s; }
      .fade-in-2 { animation: fadeUp 0.6s ease both; animation-delay: 0.35s; }
      .fade-in-3 { animation: fadeUp 0.6s ease both; animation-delay: 0.55s; }
      .fade-in-4 { animation: fadeUp 0.6s ease both; animation-delay: 0.75s; }
      @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      .grid-line { stroke: #161b22; stroke-width: 0.5; }
    </style>
  </defs>

  <rect width="680" height="160" class="banner-bg" rx="8"/>
  <line x1="0" y1="40" x2="680" y2="40" class="grid-line"/>
  <line x1="0" y1="120" x2="680" y2="120" class="grid-line"/>
  <line x1="120" y1="0" x2="120" y2="160" class="grid-line"/>

  <g class="fade-in-1">
    <text x="40" y="28" class="accent-text">// profile</text>
  </g>
  <g class="fade-in-2">
    <circle cx="48" cy="80" r="5" class="dot"/>
    <text x="70" y="85" class="name-text">Vikas D. Mariyappa</text>
    <line x1="40" y1="55" x2="40" y2="115" stroke="#3fb950" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="fade-in-3">
    <text x="70" y="107" class="sub-text">CS @ UT Dallas · AI &amp; ML · Builder</text>
    <rect x="314" y="94" width="8" height="14" class="cursor" rx="1"/>
  </g>
  <g class="fade-in-4">
    <text x="40" y="145" class="accent-text">open to work</text>
    <text x="136" y="145" class="sub-text">· Dallas, TX · Class of 2027</text>
  </g>
</svg>
